<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Train Ops Engine v2</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="map"></div>

<div id="ui">

  <div id="top">
    💰 <span id="money">0</span> Kč | 🚉 Plzeň | Koleje: <span id="tracksCount"></span>
  </div>

  <div id="content">
    <div id="queue"></div>

    <div id="detail">
      <h3 id="name">Vyber vlak</h3>
      <p id="state">---</p>

      <img id="img" style="display:none;"/>

      <div class="bar"><div id="p1" class="fill"></div></div>
      <div class="bar"><div id="p2" class="fill"></div></div>
      <div class="bar"><div id="p3" class="fill"></div></div>

      <div id="actions"></div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="routes.js"></script>
<script src="trains.js"></script>
<script src="data.js"></script>
<script src="game.js"></script>

</body>
</html>
