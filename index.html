<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <title>BUSGAME – Live Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    body { margin:0 }
    #map { width:100vw; height:100vh }
    #info {
      position:absolute; top:10px; left:10px;
      background:white; padding:8px; z-index:1000;
      border-radius:6px;
    }
  </style>
</head>
<body>

<div id="info">
  <b>BUSGAME</b><br>
  <span id="money">–</span><br>
  <small>Klikni na mapu pro start</small>
</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map('map').setView([49.05, 13.78], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let started = false;
let linesLayer = L.layerGroup().addTo(map);
let stopsLayer = L.layerGroup().addTo(map);

map.on('click', async e => {
  if (started) return;

  await fetch('/api/start', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(e.latlng)
  });

  started = true;
});

async function refresh() {
  const state = await fetch('/api/state').then(r => r.json());
  document.getElementById('money').innerText = `💰 ${state.money} Kč`;

  linesLayer.clearLayers();
  stopsLayer.clearLayers();

  state.lines.forEach(line => {
    L.polyline(line.stops, { color: 'blue' }).addTo(linesLayer);
  });

  state.stops.forEach(s => {
    L.circleMarker([s.lat, s.lon], { radius:5 }).addTo(stopsLayer);
  });
}

setInterval(refresh, 1000);
</script>
</body>
</html>
